version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ordercookandpay_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ordercookandpay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ordercookandpay_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ordercookandpay
      PORT: 4000
      NODE_ENV: development
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src
      - ./server/migrations:/app/migrations
    command: npm run dev

volumes:
  postgres_data:
